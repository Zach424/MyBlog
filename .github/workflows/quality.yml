name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, test, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run the complete quality gate
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
