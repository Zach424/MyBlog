name: Roll back Vercel production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Previous production deployment URL to restore"
        required: true
        type: string
      reason:
        description: "Reason recorded with the rollback deployment"
        required: true
        default: "Production smoke test failed"
        type: string

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Roll back and verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
      DEPLOYMENT_URL: ${{ inputs.deployment_url }}
      ROLLBACK_REASON: ${{ inputs.reason }}
    steps:
      - name: Check out the rollback verifier
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require the stable production URL
        run: test -n "$PRODUCTION_URL"

      - name: Record the rollback reason
        run: |
          echo "Rollback reason: $ROLLBACK_REASON"

      - name: Roll back the Vercel production deployment
        shell: bash
        run: |
          args=(rollback "$DEPLOYMENT_URL")
          args+=(--token "$VERCEL_TOKEN" --timeout 120s)
          npx --yes vercel@56.3.2 "${args[@]}"

      - name: Verify the restored production version
        run: npm run production:smoke -- "$PRODUCTION_URL" --expect-oauth
