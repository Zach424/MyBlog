name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy the exact commit
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate source and build the Worker
        run: npm run check

      - name: Deploy to the owner's Cloudflare account
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --name zach424-myblog
          secrets: |
            GITHUB_OAUTH_ID
            GITHUB_OAUTH_SECRET
        env:
          GITHUB_OAUTH_ID: ${{ secrets.GITHUB_OAUTH_ID }}
          GITHUB_OAUTH_SECRET: ${{ secrets.GITHUB_OAUTH_SECRET }}

      - name: Smoke-test the deployed URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: npm run production:smoke -- "$DEPLOYMENT_URL" --expect-oauth
