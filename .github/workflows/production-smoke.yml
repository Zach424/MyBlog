name: Verify Vercel production

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Production deployment URL to verify"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: vercel-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke-test the deployed site
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOYMENT_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_url || vars.VERCEL_PRODUCTION_URL || github.event.deployment_status.environment_url }}
    steps:
      - name: Check out the production verifier
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify the deployed route and publishing contract
        run: npm run production:smoke -- "$DEPLOYMENT_URL" --expect-oauth
